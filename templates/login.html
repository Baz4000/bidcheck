<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empire OS — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a2744;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .brand {
      color: #1a2744;
      font-size: 1.4em;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #667;
      font-size: .85em;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: .82em;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
    }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 5px;
      font-size: .9em;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    input[type=text]:focus, input[type=password]:focus {
      outline: none;
      border-color: #1a4a7a;
    }
    button[type=submit] {
      width: 100%;
      padding: 10px;
      background: #1a4a7a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .92em;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type=submit]:hover { background: #1e5a94; }
    .errors {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 5px;
      padding: 10px 14px;
      font-size: .85em;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Empire OS</div>
    <div class="subtitle">Sign in to continue</div>

    {% if form.errors %}
    <div class="errors">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      {{ form.username }}
      <label for="id_password">Password</label>
      {{ form.password }}
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
